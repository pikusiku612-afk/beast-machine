name: server computer 24/7

on:
  workflow_dispatch:
  repository_dispatch:
    types: [ouroboros_trigger]

# এই লকটি নিশ্চিত করবে যে একসাথে একটির বেশি লুপ কোনোভাবেই চলবে না
concurrency:
  group: beast-machine-lock

jobs:
  beast-loop:
    runs-on: ubuntu-latest

    steps:
      - name: "Tailscale Setup"
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --hostname=server-computer
          
      - name: "SSH Setup"
        run: |
          sudo apt-get update && sudo apt-get install -y openssh-server
          echo "root:root" | sudo chpasswd
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/g' /etc/ssh/sshd_config
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/g' /etc/ssh/sshd_config
          sudo sed -i 's/PermitRootLogin prohibit-password/PermitRootLogin yes/g' /etc/ssh/sshd_config
          echo "PermitRootLogin yes" | sudo tee -a /etc/ssh/sshd_config
          sudo systemctl restart ssh
          
      - name: "Marathon Run"
        run: |
          echo "ওস্তাদ, আপনার beast-machine এখন পুরোপুরি আপনার দখলে!"
          echo "ইউজার: root | পাসওয়ার্ড: root"
          sleep 21000
          
      - name: "Ouroboros Trigger"
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "ouroboros_trigger"}'
